name: "Vault Env Generator"
author: "Maksym Maliuk"
description: "A GitHub Action that generates environment variables from Vault secrets and outputs them to a specified file."

inputs:
  addr:
    required: true
    description: "The address of the Vault server (e.g., https://vault.example.com)."
  token:
    required: true
    description: "The authentication token for Vault."
  template:
    required: true
    description: "The path to the template file containing placeholders for secrets (e.g., ./template.env)."
  output:
    required: false
    description: "The path to the output file where the generated environment variables will be saved (default: ./output.env)."

runs:
  using: "node20"
  main: "dist/cli.js"
